<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>開運カレンダー</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:-apple-system;
margin:0;
background:#0f2027;
color:white;
}

header{
text-align:center;
padding:20px;
font-size:24px;
}

#calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:5px;
padding:10px;
}

.day{
background:#1b2b34;
border-radius:10px;
padding:10px;
cursor:pointer;
}

.day:hover{
background:#223a45;
}

.event{
font-size:11px;
}

</style>
</head>

<body>

<header>🌙 開運カレンダー</header>

<div id="calendar"></div>

<script src="https://unpkg.com/qreki/qreki.js"></script>
<script src="app.js"></script>

</body>
</html>
