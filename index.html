<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>開運カレンダー</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:-apple-system;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
margin:0;
text-align:center;
}

h1{
margin:20px;
font-weight:300;
letter-spacing:2px;
}

#calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:6px;
padding:10px;
}

.day{
background:rgba(255,255,255,0.08);
padding:12px;
border-radius:14px;
cursor:pointer;
transition:.2s;
}

.day:hover{
background:rgba(255,255,255,0.2);
transform:scale(1.05);
}

.event{
font-size:10px;
margin-top:4px;
}

#detail{
position:fixed;
bottom:0;
left:0;
right:0;
background:#111;
padding:20px;
border-radius:20px 20px 0 0;
display:none;
}

textarea{
width:90%;
height:80px;
border-radius:10px;
border:none;
padding:10px;
}

.lucky{
margin-top:10px;
font-size:14px;
}

</style>
</head>

<body>

<h1>🌙 開運カレンダー</h1>

<div id="calendar"></div>

<div id="detail">
<h2 id="dateTitle"></h2>

<div id="info"></div>

<div class="lucky" id="lucky"></div>

<textarea id="memo" placeholder="今日の記録"></textarea><br>
<button onclick="saveMemo()">保存</button>
<button onclick="closeDetail()">閉じる</button>

</div>

<script>

const luckyColors=["金","紫","緑","青","赤","白"]
const flowers=["桜","薔薇","百合","菊","椿"]
const items=["財布","鏡","香水","本","アクセサリー"]

const events={
"2026-03-14":"🌕満月",
"2026-03-29":"🌑新月",
"2026-03-10":"💰一粒万倍日",
"2026-03-22":"🐯寅の日",
"2026-03-18":"🐍巳の日"
}

const rokuyo=["先勝","友引","先負","仏滅","大安","赤口"]

function generateCalendar(){

let now=new Date()
let year=now.getFullYear()
let month=now.getMonth()

let lastDay=new Date(year,month+1,0).getDate()

for(let i=1;i<=lastDay;i++){

let date=`${year}-${month+1}-${i}`

let div=document.createElement("div")
div.className="day"
div.innerHTML=`
<b>${i}</b>
<div class="event">${rokuyo[i%6]}</div>
<div class="event">${events[date]||""}</div>
`

div.onclick=()=>openDetail(date)

calendar.appendChild(div)

}

}

function openDetail(date){

dateTitle.innerText=date

let color=luckyColors[Math.floor(Math.random()*luckyColors.length)]
let flower=flowers[Math.floor(Math.random()*flowers.length)]
let item=items[Math.floor(Math.random()*items.length)]

lucky.innerHTML=`
🎨ラッキーカラー：${color}<br>
🌸ラッキーフラワー：${flower}<br>
🍀ラッキーアイテム：${item}<br>
🧭吉方位：東
`

memo.value=localStorage.getItem(date)||""

detail.style.display="block"

}

function closeDetail(){
detail.style.display="none"
}

function saveMemo(){

let date=dateTitle.innerText
localStorage.setItem(date,memo.value)

alert("保存しました")

}

generateCalendar()

</script>

</body>
</html>
