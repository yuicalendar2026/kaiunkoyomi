<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 ゆるっと開運カレンダー 🌈</title>
    <style>
        :root {
            --bg-color: #fffaf2;
            --main-color: #ffb7b7;
            --text-color: #5d5d5d;
        }
        body {
            font-family: 'Hiragino Maru Gothic ProN', 'Meiryo', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }
        .calendar-card {
            background: white;
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            max-width: 450px; width: 100%;
        }
        .header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; font-size: 1.2rem; font-weight: bold; color: #ff7675;
        }
        .grid {
            display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px;
        }
        .weekday { font-size: 0.7rem; text-align: center; color: #bbb; margin-bottom: 5px; }
        .day {
            aspect-ratio: 1/1.2; border: 1px solid #f9f9f9; border-radius: 12px;
            display: flex; flex-direction: column; align-items: center; padding: 4px;
            cursor: pointer; position: relative; font-size: 0.9rem; background: #fff;
        }
        .day:hover { background: #fff0f0; }
        .day.today { border: 2px solid #ff9a9e; background: #fff5f5; }
        .icon-container {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 2px; margin-top: 2px;
        }
        .icon { font-size: 0.8rem; }
        .note-dot {
            width: 4px; height: 4px; background: #81ecec; border-radius: 50%;
            position: absolute; top: 4px; right: 4px;
        }
        /* モーダル */
        #modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 100;
        }
        .modal-content {
            background: white; padding: 25px; border-radius: 20px; width: 85%; max-width: 320px;
        }
        textarea {
            width: 100%; height: 100px; border-radius: 12px; border: 1px solid #eee;
            padding: 10px; margin: 15px 0; font-size: 1rem; box-sizing: border-box;
        }
        .btn-save {
            background: #ff9a9e; color: white; border: none; padding: 10px 20px;
            border-radius: 20px; font-weight: bold; width: 100%; cursor: pointer;
        }
        .lucky-label { font-size: 0.8rem; color: #e67e22; background: #fff3e0; padding: 2px 8px; border-radius: 10px; }
    </style>
</head>
<body>

    <h1 style="font-size: 1.4rem; margin-bottom: 15px;">2026 ゆるっと開運 🌈</h1>
    
    <div class="calendar-card">
        <div class="header">
            <button onclick="changeMonth(-1)" style="border:none; background:none; cursor:pointer;">◀</button>
            <span id="currentMonth">2026年 3月</span>
            <button onclick="changeMonth(1)" style="border:none; background:none; cursor:pointer;">▶</button>
        </div>
        <div class="grid" id="calendarGrid"></div>
    </div>

    <div id="modal">
        <div class="modal-content">
            <div id="modalDate" style="font-weight:bold; margin-bottom:5px;"></div>
            <div id="luckyText"></div>
            <textarea id="noteInput" placeholder="今日の予定や願い事は？"></textarea>
            <button class="btn-save" onclick="saveNote()">保存する</button>
            <button onclick="closeModal()" style="border:none; background:none; margin-top:10px; color:#aaa; width:100%; cursor:pointer;">閉じる</button>
        </div>
    </div>

    <script>
        let currentYear = 2026;
        let currentMonth = 2; // 3月 (0-indexed)

        // 固定の吉日データ (一粒万倍日、天赦日、新月満月)
        const fixedLuckyDays = {
            "2026-03-14": "🌾", "2026-03-19": "🌑新月", "2026-03-26": "🌾", "2026-03-29": "🌾",
            "2026-04-01": "🌑新月", "2026-04-10": "🌾", "2026-04-13": "🌾", "2026-04-22": "🌾", "2026-04-25": "🌾",
            "2026-05-04": "☀️天赦日", "2026-05-20": "☀️天赦日",
            "2026-07-19": "☀️天赦日", "2026-10-01": "☀️天赦日", "2026-12-16": "☀️天赦日"
            // 他の月も同様にここへ追加可能
        };

        // 十二支を計算する関数 (1867/2/5が寅の日であることを基準に簡易計算)
        function getZodiacIcon(year, month, day) {
            const date = new Date(year, month, day);
            const baseDate = new Date(1900, 0, 1); // 基準日
            const diffDays = Math.floor((date - baseDate) / (1000 * 60 * 60 * 24));
            const zodiacIndex = (diffDays + 10) % 12; // 0:子, 1:丑, 2:寅...
            if (zodiacIndex === 2) return "🐯";
            if (zodiacIndex === 5) return "🐍";
            return null;
        }

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';
            document.getElementById('currentMonth').innerText = `${currentYear}年 ${currentMonth + 1}月`;

            ['日','月','火','水','木','金','土'].forEach(w => {
                const div = document.createElement('div');
                div.className = 'weekday'; div.innerText = w; grid.appendChild(div);
            });

            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

            for(let i=0; i<firstDay; i++) grid.appendChild(document.createElement('div'));

            for(let d=1; d<=daysInMonth; d++) {
                const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const dayEl = document.createElement('div');
                dayEl.className = 'day';
                dayEl.innerHTML = `<span>${d}</span>`;

                const icons = [];
                // 固定吉日のチェック
                if(fixedLuckyDays[dateStr]) icons.push(fixedLuckyDays[dateStr]);
                // 十二支のチェック (寅・巳)
                const zodiac = getZodiacIcon(currentYear, currentMonth, d);
                if(zodiac) icons.push(zodiac);

                const iconDiv = document.createElement('div');
                iconDiv.className = 'icon-container';
                icons.forEach(icon => {
                    const span = document.createElement('span');
                    span.className = 'icon'; span.innerText = icon;
                    iconDiv.appendChild(span);
                });
                dayEl.appendChild(iconDiv);

                if(localStorage.getItem(dateStr)) {
                    const dot = document.createElement('div');
                    dot.className = 'note-dot'; dayEl.appendChild(dot);
                }

                dayEl.onclick = () => openModal(dateStr, icons.join(' '));
                grid.appendChild(dayEl);
            }
        }

        function openModal(date, lucky) {
            selectedDate = date;
            document.getElementById('modalDate').innerText = date;
            document.getElementById('luckyText').innerHTML = lucky ? `<span class="lucky-label">${lucky}</span>` : "";
            document.getElementById('noteInput').value = localStorage.getItem(date) || "";
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        function saveNote() {
            localStorage.setItem(selectedDate, document.getElementById('noteInput').value);
            closeModal(); renderCalendar();
        }

        function changeMonth(diff) {
            currentMonth += diff;
            if(currentMonth > 11) { currentMonth = 0; currentYear++; }
            if(currentMonth < 0) { currentMonth = 11; currentYear--; }
            renderCalendar();
        }

        renderCalendar();
    </script>
</body>
</html>
