<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>開運カレンダーPRO</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="manifest" href="manifest.json">

<style>

body{
font-family:-apple-system;
margin:0;
color:white;
background:radial-gradient(circle at top,#1e3c72,#0f2027);
}

header{
text-align:center;
padding:20px;
font-size:24px;
letter-spacing:3px;
}

#calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:6px;
padding:10px;
}

.day{
background:rgba(255,255,255,0.08);
border-radius:14px;
padding:12px;
cursor:pointer;
transition:.2s;
}

.day:hover{
background:rgba(255,255,255,0.2);
}

.event{
font-size:10px;
opacity:.8;
}

#detail{
position:fixed;
bottom:0;
left:0;
right:0;
background:#111;
border-radius:20px 20px 0 0;
padding:20px;
display:none;
}

textarea{
width:100%;
height:90px;
border-radius:10px;
border:none;
padding:10px;
}

button{
margin-top:10px;
padding:10px 20px;
border:none;
border-radius:10px;
}

</style>
</head>

<body>

<header>🌙 開運カレンダー PRO</header>

<div id="calendar"></div>

<div id="detail">

<h2 id="dateTitle"></h2>

<div id="fortune"></div>

<textarea id="memo" placeholder="今日の記録"></textarea>

<button onclick="saveMemo()">保存</button>
<button onclick="closeDetail()">閉じる</button>

<div id="shrine"></div>

</div>

<script src="app.js"></script>

<script>
if('serviceWorker' in navigator){
navigator.serviceWorker.register('sw.js')
}
</script>

</body>
</html>
