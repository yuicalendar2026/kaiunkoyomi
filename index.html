<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>開運カレンダー完全版</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:-apple-system;
margin:0;
background:linear-gradient(140deg,#0f2027,#203a43,#2c5364);
color:white;
}

header{
text-align:center;
padding:20px;
font-size:24px;
}

#calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:6px;
padding:10px;
}

.day{
background:rgba(255,255,255,0.1);
border-radius:12px;
padding:10px;
cursor:pointer;
}

.event{
font-size:10px;
}

#detail{
position:fixed;
bottom:0;
left:0;
right:0;
background:#111;
padding:20px;
display:none;
border-radius:20px 20px 0 0;
}

textarea{
width:100%;
height:80px;
}

</style>
</head>

<body>

<header>🌙 開運カレンダー</header>

<div id="calendar"></div>

<div id="detail">

<h2 id="dateTitle"></h2>

<div id="fortune"></div>

<textarea id="memo"></textarea>

<button onclick="saveMemo()">保存</button>
<button onclick="closeDetail()">閉じる</button>

</div>

<script src="app.js"></script>

</body>
</html>
