<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 ゆるっと開運カレンダー 🌈</title>
    <style>
        :root {
            --bg-color: #fffaf2;
            --main-color: #ffb7b7;
            --special-day: #fff0f0;
        }
        body {
            font-family: 'Hiragino Maru Gothic ProN', 'Meiryo', sans-serif;
            background-color: var(--bg-color);
            color: #5d5d5d;
            margin: 0; padding: 10px;
            display: flex; flex-direction: column; align-items: center;
        }
        .calendar-card {
            background: white;
            border-radius: 20px;
            padding: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            max-width: 500px; width: 100%;
        }
        .header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 15px; font-size: 1.1rem; font-weight: bold; color: #ff7675;
        }
        .grid {
            display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px;
        }
        .weekday { font-size: 0.7rem; text-align: center; color: #bbb; margin-bottom: 5px; }
        .day {
            min-height: 95px; /* 4つ重なっても大丈夫なようにさらに少し縦長に */
            border: 1px solid #f0f0f0; border-radius: 8px;
            display: flex; flex-direction: column; align-items: center;
            padding: 4px 2px; cursor: pointer; position: relative;
            font-size: 0.9rem; background: #fff;
        }
        .day:hover { background: #fff8f8; }
        /* 3月5日などの超最強日は背景色を変える */
        .super-lucky { background-color: #fff9db !important; border: 2px solid #ffd700 !important; }
        .day.today { border: 2px solid #ff9a9e; background: #fff5f5; }
        
        .icon-list {
            display: flex; flex-wrap: wrap; justify-content: center;
            gap: 2px; margin-top: 4px; width: 100%;
        }
        .icon { font-size: 0.9rem; line-height: 1.2; }
        .note-marker { font-size: 0.6rem; color: #81ecec; margin-top: auto; font-weight: bold; }

        #modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 100;
        }
        .modal-content { background: white; padding: 20px; border-radius: 20px; width: 85%; max-width: 320px; }
        textarea { width: 100%; height: 100px; border-radius: 12px; border: 1px solid #eee; padding: 10px; margin: 15px 0; font-size: 1rem; box-sizing: border-box; }
        .btn-save { background: #ff9a9e; color: white; border: none; padding: 12px; border-radius: 25px; font-weight: bold; width: 100%; cursor: pointer; }
    </style>
</head>
<body>

    <h1 style="font-size: 1.2rem; margin: 10px 0;">最強開運カレンダー 2026 🌈</h1>
    
    <div class="calendar-card">
        <div class="header">
            <button onclick="changeMonth(-1)" style="border:none; background:none; cursor:pointer;">◀</button>
            <span id="currentMonth">2026年 3月</span>
            <button onclick="changeMonth(1)" style="border:none; background:none; cursor:pointer;">▶</button>
        </div>
        <div class="grid" id="calendarGrid"></div>
    </div>

    <div id="modal">
        <div class="modal-content">
            <div id="modalDate" style="font-weight:bold;"></div>
            <div id="luckyList" style="margin: 10px 0; font-size: 0.85rem; color: #d35400; font-weight: bold;"></div>
            <textarea id="noteInput" placeholder="今日の予定や願い事は？"></textarea>
            <button class="btn-save" onclick="saveNote()">保存する</button>
            <button onclick="closeModal()" style="border:none; background:none; margin-top:10px; color:#aaa; width:100%; cursor:pointer;">閉じる</button>
        </div>
    </div>

    <script>
        let currentYear = 2026;
        let currentMonth = 2; 

        // 2026年の精密データ（一粒万倍日、天赦日、大安、新月満月など）
        const luckyData = {
            // 3月
            "2026-03-05": ["🌾", "☀️", "㊗️", "🐯"], // 超最強日
            "2026-03-14": ["🌾", "㊗️"],
            "2026-03-17": ["🌾"],
            "2026-03-19": ["🌑"],
            "2026-03-20": ["✨", "㊗️"], // 春分・大安
            "2026-03-26": ["㊗️", "🌾"],
            "2026-03-29": ["🌾"],
            // 4月以降の主要な最強日
            "2026-05-04": ["☀️", "🐯"],
            "2026-05-20": ["☀️"],
            "2026-07-19": ["☀️", "🌾"],
            "2026-10-01": ["☀️", "🌾"],
            "2026-12-16": ["☀️", "🌾"]
        };

        // 干支（寅・巳）の自動計算
        function getZodiacIcon(year, month, day) {
            const date = new Date(year, month, day);
            const base = new Date(1900, 0, 1);
            const diff = Math.floor((date - base) / (1000 * 60 * 60 * 24));
            const idx = (diff + 10) % 12; 
            if (idx === 2) return "🐯";
            if (idx === 5) return "🐍";
            return null;
        }

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';
            document.getElementById('currentMonth').innerText = `${currentYear}年 ${currentMonth + 1}月`;

            ['日','月','火','水','木','金','土'].forEach(w => {
                const div = document.createElement('div');
                div.className = 'weekday'; div.innerText = w; grid.appendChild(div);
            });

            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

            for(let i=0; i<firstDay; i++) grid.appendChild(document.createElement('div'));

            for(let d=1; d<=daysInMonth; d++) {
                const dateFull = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const dayEl = document.createElement('div');
                dayEl.className = 'day';
                dayEl.innerHTML = `<span style="font-weight:bold">${d}</span>`;

                let icons = luckyData[dateFull] ? [...luckyData[dateFull]] : [];
                
                // 干支アイコン（重複しないように追加）
                const zodiac = getZodiacIcon(currentYear, currentMonth, d);
                if(zodiac && !icons.includes(zodiac)) icons.push(zodiac);

                // アイコンの数が多い日はクラスを追加
                if(icons.length >= 3) dayEl.classList.add('super-lucky');

                const iconDiv = document.createElement('div');
                iconDiv.className = 'icon-list';
                icons.forEach(icon => {
                    const s = document.createElement('span');
                    s.className = 'icon'; s.innerText = icon;
                    iconDiv.appendChild(s);
                });
                dayEl.appendChild(iconDiv);

                if(localStorage.getItem(dateFull)) {
                    const n = document.createElement('div');
                    n.className = 'note-marker'; n.innerText = "✎予定あり";
                    dayEl.appendChild(n);
                }

                dayEl.onclick = () => openModal(dateFull, icons);
                grid.appendChild(dayEl);
            }
        }

        let selectedDate = "";
        function openModal(date, icons) {
            selectedDate = date;
            document.getElementById('modalDate').innerText = date.replace(/-/g, '/');
            const names = {"🌾":"一粒万倍日","☀️":"天赦日","✨":"宇宙元旦","🐯":"寅の日","🐍":"巳の日","㊗️":"大安","🌑":"新月","🌕":"満月"};
            const luckyNames = icons.map(i => names[i] || i).join('・');
            document.getElementById('luckyList').innerText = luckyNames ? `✨ ${luckyNames}` : "（通常の運勢の日）";
            document.getElementById('noteInput').value = localStorage.getItem(date) || "";
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        function saveNote() {
            localStorage.setItem(selectedDate, document.getElementById('noteInput').value);
            closeModal(); renderCalendar();
        }
        function changeMonth(diff) {
            currentMonth += diff;
            if(currentMonth > 11) { currentMonth = 0; currentYear++; }
            if(currentMonth < 0) { currentMonth = 11; currentYear--; }
            renderCalendar();
        }
        renderCalendar();
    </script>
</body>
</html>
