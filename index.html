<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>開運カレンダー</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family:-apple-system;
margin:0;
background:#0f2027;
color:white;
}

header{
text-align:center;
padding:20px;
font-size:24px;
}

#calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:6px;
padding:10px;
}

.day{
background:#1b2b34;
padding:20px;
text-align:center;
border-radius:10px;
}
</style>

</head>

<body>

<header>開運カレンダー</header>

<div id="calendar"></div>

<script>

const calendar=document.getElementById("calendar")

function generateCalendar(){

const now=new Date()

const year=now.getFullYear()
const month=now.getMonth()

const lastDay=new Date(year,month+1,0).getDate()

for(let d=1;d<=lastDay;d++){

const div=document.createElement("div")

div.className="day"

div.innerText=d

calendar.appendChild(div)

}

}

generateCalendar()

</script>

</body>
</html>
