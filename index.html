<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 ゆるっと開運カレンダー 🌈</title>
    <style>
        :root {
            --bg-color: #fff9f0;
            --main-color: #ff9a9e;
            --lucky-gold: #ffcc00;
        }
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: var(--bg-color);
            color: #555;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        h1 { font-size: 1.5rem; color: #ff7675; margin-bottom: 10px; }
        .calendar-container {
            background: white;
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            max-width: 400px;
            width: 100%;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-weight: bold;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
        }
        .day-label { font-size: 0.7rem; text-align: center; color: #aaa; padding-bottom: 5px; }
        .day {
            aspect-ratio: 1 / 1;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            font-size: 0.9rem;
            transition: background 0.2s;
            border: 1px solid #f0f0f0;
        }
        .day:hover { background-color: #fff0f0; }
        .day.today { background-color: #ffeaa7; font-weight: bold; border: 2px solid #fdcb6e; }
        .lucky-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: var(--lucky-gold);
            position: absolute;
            bottom: 4px;
        }
        .note-indicator {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background-color: #81ecec;
            position: absolute;
            top: 4px;
            right: 4px;
        }
        /* モーダル */
        #modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 20px;
            width: 80%;
            max-width: 300px;
            text-align: center;
        }
        textarea {
            width: 100%;
            height: 80px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid #ddd;
            padding: 10px;
            box-sizing: border-box;
            font-size: 14px;
        }
        .btn {
            background: var(--main-color);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }
        .lucky-info {
            font-size: 0.75rem;
            color: #e67e22;
            margin-bottom: 5px;
            display: block;
        }
    </style>
</head>
<body>

    <h1>ゆるっと開運 2026 🌈</h1>
    
    <div class="calendar-container">
        <div class="header">
            <span id="monthDisplay">2026年 3月</span>
        </div>
        <div class="grid" id="calendarGrid">
            </div>
    </div>

    <p style="font-size: 0.8rem; color: #888; margin-top: 15px;">
        💡 黄金の点は「吉日」です。タップして予定を保存！
    </p>

    <div id="modal">
        <div class="modal-content">
            <h3 id="modalDate" style="margin-top:0">日付</h3>
            <span id="luckyText" class="lucky-info"></span>
            <textarea id="noteInput" placeholder="今日の予定や願い事は？"></textarea>
            <button class="btn" onclick="saveNote()">保存する</button>
            <button class="btn" style="background:#ccc; margin-left:5px" onclick="closeModal()">閉じる</button>
        </div>
    </div>

    <script>
        // 2026年の主要な開運日データ
        const luckyDays = {
            "2026-03-14": "🌾一粒万倍日",
            "2026-03-20": "✨宇宙元旦 (春分)",
            "2026-03-26": "🐯寅の日 (金運UP)",
            "2026-04-13": "🌾一粒万倍日",
            "2026-05-04": "☀️天赦日＋🐯最強日",
            "2026-05-20": "☀️天赦日",
            "2026-07-19": "☀️天赦日＋🌾",
            "2026-10-01": "☀️天赦日＋🌾",
            "2026-12-16": "☀️天赦日＋🌾"
        };

        let selectedDate = "";
        const grid = document.getElementById('calendarGrid');
        const modal = document.getElementById('modal');
        const noteInput = document.getElementById('noteInput');

        function initCalendar() {
            const now = new Date();
            let year = 2026;
            let month = now.getMonth(); // 実行時の月を表示
            if (now.getFullYear() > 2026) month = 0; // 2026年以降なら1月を表示

            document.getElementById('monthDisplay').innerText = `${year}年 ${month + 1}月`;
            
            // 曜日のラベル
            const days = ['日','月','火','水','木','金','土'];
            days.forEach(d => {
                const el = document.createElement('div');
                el.className = 'day-label';
                el.innerText = d;
                grid.appendChild(el);
            });

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            // 空白
            for(let i=0; i<firstDay; i++) {
                grid.appendChild(document.createElement('div'));
            }

            // 日付
            for(let d=1; d<=daysInMonth; d++) {
                const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const dayEl = document.createElement('div');
                dayEl.className = 'day';
                dayEl.innerText = d;
                
                // 今日の判定
                const today = new Date();
                if(today.getFullYear()===year && today.getMonth()===month && today.getDate()===d) {
                    dayEl.classList.add('today');
                }

                // 吉日判定
                if(luckyDays[dateStr]) {
                    const dot = document.createElement('div');
                    dot.className = 'lucky-dot';
                    dayEl.appendChild(dot);
                }

                // メモあり判定
                if(localStorage.getItem(dateStr)) {
                    const dot = document.createElement('div');
                    dot.className = 'note-indicator';
                    dayEl.appendChild(dot);
                }

                dayEl.onclick = () => openModal(dateStr);
                grid.appendChild(dayEl);
            }
        }

        function openModal(date) {
            selectedDate = date;
            document.getElementById('modalDate').innerText = date.replace(/-/g, '/');
            document.getElementById('luckyText').innerText = luckyDays[date] || "";
            noteInput.value = localStorage.getItem(date) || "";
            modal.style.display = 'flex';
        }

        function closeModal() {
            modal.style.display = 'none';
        }

        function saveNote() {
            localStorage.setItem(selectedDate, noteInput.value);
            closeModal();
            location.reload(); // 状態更新のためリロード
        }

        initCalendar();
    </script>
</body>
</html>
