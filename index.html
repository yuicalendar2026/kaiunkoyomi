<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>開運カレンダー</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="manifest" href="manifest.json">

<style>

body{
font-family:-apple-system;
margin:0;
background:#0f2027;
color:white;
}

header{
text-align:center;
padding:20px;
font-size:22px;
}

#calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:6px;
padding:10px;
}

.day{
background:#1b2b34;
border-radius:10px;
padding:15px;
text-align:center;
cursor:pointer;
}

.day:hover{
background:#223a45;
}

#detail{
position:fixed;
bottom:0;
left:0;
right:0;
background:#111;
padding:20px;
display:none;
border-radius:20px 20px 0 0;
}

textarea{
width:100%;
height:80px;
}

button{
margin-top:10px;
padding:10px 20px;
border:none;
border-radius:10px;
}

</style>
</head>

<body>

<header>🌙 開運カレンダー</header>

<div id="calendar"></div>

<div id="detail">

<h3 id="dateTitle"></h3>

<textarea id="memo"></textarea><br>

<button onclick="saveMemo()">保存</button>
<button onclick="closeDetail()">閉じる</button>

</div>

<script>

const calendar=document.getElementById("calendar")

function generateCalendar(){

calendar.innerHTML=""

const now=new Date()
const year=now.getFullYear()
const month=now.getMonth()

const firstDay=new Date(year,month,1).getDay()
const lastDay=new Date(year,month+1,0).getDate()

for(let i=0;i<firstDay;i++){

const empty=document.createElement("div")
calendar.appendChild(empty)

}

for(let d=1;d<=lastDay;d++){

const date=new Date(year,month,d)

const div=document.createElement("div")

div.className="day"

div.innerHTML=d

div.onclick=()=>openDetail(date)

calendar.appendChild(div)

}

}

function openDetail(date){

detail.style.display="block"

dateTitle.innerText=date.toDateString()

memo.value=localStorage.getItem(dateTitle.innerText)||""

}

function saveMemo(){

localStorage.setItem(dateTitle.innerText,memo.value)

alert("保存しました")

}

function closeDetail(){

detail.style.display="none"

}

generateCalendar()

</script>

</body>
</html>
